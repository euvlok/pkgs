name: Build Packages

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Package names to build, separated by commas or whitespace. Use 'all' explicitly for a full build."
        required: false
        default: ""
  push:
    branches: [master]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pkgs/**"
      - ".github/actions/setup-nix/action.yml"
      - ".github/workflows/build-packages.yaml"
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pkgs/**"
      - ".github/actions/setup-nix/action.yml"
      - ".github/workflows/build-packages.yaml"

permissions:
  contents: read

concurrency:
  group: build-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-packages:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has_packages: ${{ steps.detect.outputs.has_packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE_NAME || 'eupkgs' }}

      - name: Detect packages
        id: detect
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PACKAGES: ${{ github.event.inputs.packages || '' }}
        run: nix develop --accept-flake-config --impure --command python3 ./scripts/changed-packages.py --packages "$PACKAGES"

  flake-check:
    name: Check flake evaluation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE_NAME || 'eupkgs' }}

      - name: Check flake outputs without building packages
        run: nix flake check --accept-flake-config --impure --no-build

  build-packages:
    name: Build Packages (${{ matrix.platform }})
    needs: detect-packages
    if: needs.detect-packages.outputs.has_packages == 'true'
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runs-on: ubuntu-latest
          - platform: darwin
            runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE_NAME || 'eupkgs' }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: ${{ github.event_name == 'pull_request' }}

      - name: Build selected by-name packages
        shell: bash
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
          PACKAGES_JSON: ${{ needs.detect-packages.outputs.packages }}
        run: |-
          set -euo pipefail

          system="$(nix eval --accept-flake-config --impure --raw --expr builtins.currentSystem)"
          package_names=()
          while IFS= read -r package_name; do
            supported="$(
              nix eval --accept-flake-config --impure --raw --expr "
              let
                flake = builtins.getFlake (toString ./.);
                system = builtins.currentSystem;
                pkgs = builtins.getAttr system flake.legacyPackages;
                pkg = builtins.getAttr \"$package_name\" pkgs;
                platforms = pkg.meta.platforms or [ ];
              in
                if platforms == [ ] || builtins.elem system platforms then \"true\" else \"false\"
            " < /dev/null
            )"
            if [[ "$supported" == "true" ]]; then
              package_names+=("$package_name")
            else
              printf "::notice::Skipping %s on %s because meta.platforms does not include this system\n" "$package_name" "$system"
            fi
          done < <(python3 -c 'import json, os; print("\n".join(json.loads(os.environ["PACKAGES_JSON"])))')
          build_attrs=("${package_names[@]/#/.#legacyPackages.${system}.}")

          if (( ${#build_attrs[@]} == 0 )); then
            printf "::notice::No selected packages are supported on %s\n" "$system"
            exit 0
          fi

          printf "Building %d package(s) for %s:\n" "${#build_attrs[@]}" "$system"
          printf "  %s\n" "${build_attrs[@]}"

          nix build --accept-flake-config --impure --keep-going --print-build-logs --no-link "${build_attrs[@]}"
